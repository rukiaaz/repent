<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Balance Dashboard</title>
    <link rel="stylesheet" href="/modern-theme.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background: var(--bg-secondary); display: flex; align-items: center; justify-content: center; min-height: 100vh;">
    <div style="text-align: center; max-width: 500px; padding: 40px;">
        <div style="font-size: 64px; margin-bottom: 24px;">⚠️</div>
        <h1 style="color: var(--text-primary); margin-bottom: 16px; font-size: 24px;">{{ error }}</h1>
        <p style="color: var(--text-secondary); margin-bottom: 32px; line-height: 1.6;">{{ message }}</p>
        <a href="/" class="btn btn-primary" style="text-decoration: none;">Return to Home</a>
    </div>
</body>
</html>
